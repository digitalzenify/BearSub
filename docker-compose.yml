version: "3.8"

services:
  bearsub:
    build: ./backend
    container_name: bearsub
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8765:8765"
    volumes:
      - ./data/db:/app/data/db
      - ./data/subs:/app/data/subs
      - ./.env:/app/.env:ro
      - ${MEDIA_ROOT_DIR:-/media}:/media:ro
    environment:
      - DB_PATH=/app/data/db/subtitles.db
      - SUBS_DIR=/app/data/subs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
