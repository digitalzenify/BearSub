upstream subs_upstream {
    server 127.0.0.1:9010;
    keepalive 32;
}

server {
    error_log  /var/log/nginx/subs.d3lphi3r.com.error.log debug;
    access_log /var/log/nginx/subs.d3lphi3r.com.access.log full;

    listen 443 quic;
    listen [::]:443 quic;
    listen 443 ssl;
    listen [::]:443 ssl;

    ssl_certificate     /etc/nginx/ssl/star.d3lphi3r.com.fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/d3lphi3r.com.key;
    ssl_trusted_certificate /etc/nginx/ssl/star.d3lphi3r.com.fullchain.pem;

    http2 on;
    http3 on;

    include /etc/nginx/snippets/hsts.conf;
    include /etc/nginx/snippets/tls.conf;
    include /etc/nginx/snippets/rate-limit-server.conf;
    include /etc/nginx/snippets/cloudflare-realip.conf;

    server_name subs.d3lphi3r.com;
    include /etc/nginx/snippets/acl_enforce.conf;

    root /opt/subscene-api/www;
    index index.html;

    location = /robots.txt { return 200 "User-agent: *\nDisallow: /\n"; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API under /api/
    location /api/ {
        proxy_redirect          off;
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_http_version      1.1;

        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;

        # strip /api/
        rewrite ^/api/(.*)$ /$1 break;

        # Inject X-API-Key if FORCE_ENTER_KEYS=false
        include /etc/nginx/snippets/subs_api_key_header.conf;

        proxy_pass http://subs_upstream;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $connection_upgrade;
    }

    location = /healthz {
        proxy_pass http://subs_upstream;
    }

    client_max_body_size 0;
}

server {
    error_log  /var/log/nginx/subs.d3lphi3r.com.error.log debug;
    access_log /var/log/nginx/subs.d3lphi3r.com.access.log full;

    include /etc/nginx/snippets/hsts.conf;
    include /etc/nginx/snippets/tls.conf;
    include /etc/nginx/snippets/rate-limit-server.conf;
    include /etc/nginx/snippets/cloudflare-realip.conf;

    listen 80;
    server_name subs.d3lphi3r.com;
    include /etc/nginx/snippets/acl_enforce.conf;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}
